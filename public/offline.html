<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#000000" />
    <title>Offline | Daily Grind</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at 20% 20%, #1c1c1c 0%, #000 58%);
        color: #f4f4f4;
        font-family: "Arial Black", Arial, sans-serif;
        text-align: center;
        padding: 24px;
      }

      main {
        width: min(560px, 100%);
        border: 1px solid rgba(255, 255, 255, 0.2);
        background: rgba(0, 0, 0, 0.7);
        backdrop-filter: blur(6px);
        padding: 28px;
      }

      img {
        width: 84px;
        height: 84px;
        object-fit: contain;
        margin-bottom: 16px;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 34px;
        line-height: 1;
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }

      p {
        margin: 0;
        font-family: Arial, sans-serif;
        color: rgba(255, 255, 255, 0.8);
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/pwa-192.png" alt="Daily Grind logo" />
      <h1>Je bent offline</h1>
      <p>
        De app werkt opnieuw volledig zodra je verbinding terug is.
        Pagina's die je eerder bezocht, blijven beschikbaar in offline modus.
      </p>
    </main>
  </body>
</html>
